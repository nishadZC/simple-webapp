name: CI-CD Pipeline

on:
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  build-scan-publish-deploy:
    runs-on: ubuntu-latest

    env:
      BACKEND_IMAGE_LOCAL: simple-backend
      FRONTEND_IMAGE_LOCAL: simple-frontend

      BACKEND_IMAGE_REMOTE: ${{ secrets.DOCKERHUB_USERNAME }}/simple-backend
      FRONTEND_IMAGE_REMOTE: ${{ secrets.DOCKERHUB_USERNAME }}/simple-frontend

      IMAGE_TAG: ${{ github.sha }}

    steps:
      ####################################################
      # Checkout Repository
      ####################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ####################################################
      # Build Images
      ####################################################

      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE_LOCAL:latest \
            -t $BACKEND_IMAGE_LOCAL:$IMAGE_TAG \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE_LOCAL:latest \
            -t $FRONTEND_IMAGE_LOCAL:$IMAGE_TAG \
            ./frontend

      ####################################################
      # Install Trivy
      ####################################################

      - name: Install Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .

      ####################################################
      # Scan Docker Images
      ####################################################

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE_LOCAL }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE_LOCAL }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      ####################################################
      # Login to Docker Hub
      ####################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ####################################################
      # Tag Images
      ####################################################

      - name: Tag Images
        run: |
          docker tag $BACKEND_IMAGE_LOCAL:latest $BACKEND_IMAGE_REMOTE:latest
          docker tag $BACKEND_IMAGE_LOCAL:$IMAGE_TAG $BACKEND_IMAGE_REMOTE:$IMAGE_TAG

          docker tag $FRONTEND_IMAGE_LOCAL:latest $FRONTEND_IMAGE_REMOTE:latest
          docker tag $FRONTEND_IMAGE_LOCAL:$IMAGE_TAG $FRONTEND_IMAGE_REMOTE:$IMAGE_TAG

      ####################################################
      # Push Images
      ####################################################

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE_REMOTE:latest
          docker push $BACKEND_IMAGE_REMOTE:$IMAGE_TAG

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE_REMOTE:latest
          docker push $FRONTEND_IMAGE_REMOTE:$IMAGE_TAG