name: CI-CD Pipeline

on:
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-scan-publish-deploy:
    runs-on: ubuntu-latest

    env:
      BACKEND_IMAGE_LOCAL: simple-backend
      FRONTEND_IMAGE_LOCAL: simple-frontend

      BACKEND_IMAGE_REMOTE: ${{ secrets.DOCKERHUB_USERNAME }}/simple-backend
      FRONTEND_IMAGE_REMOTE: ${{ secrets.DOCKERHUB_USERNAME }}/simple-frontend

      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      ####################################################
      # Build Images
      ####################################################

      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE_LOCAL:latest \
            -t $BACKEND_IMAGE_LOCAL:$IMAGE_TAG \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE_LOCAL:latest \
            -t $FRONTEND_IMAGE_LOCAL:$IMAGE_TAG \
            ./frontend

      ####################################################
      # Push Images to Docker Hub
      ####################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Images
        run: |
          docker tag $BACKEND_IMAGE_LOCAL:latest $BACKEND_IMAGE_REMOTE:latest
          docker tag $BACKEND_IMAGE_LOCAL:$IMAGE_TAG $BACKEND_IMAGE_REMOTE:$IMAGE_TAG

          docker tag $FRONTEND_IMAGE_LOCAL:latest $FRONTEND_IMAGE_REMOTE:latest
          docker tag $FRONTEND_IMAGE_LOCAL:$IMAGE_TAG $FRONTEND_IMAGE_REMOTE:$IMAGE_TAG

      - name: Push Images
        run: |
          docker push $BACKEND_IMAGE_REMOTE:latest
          docker push $BACKEND_IMAGE_REMOTE:$IMAGE_TAG

          docker push $FRONTEND_IMAGE_REMOTE:latest
          docker push $FRONTEND_IMAGE_REMOTE:$IMAGE_TAG

      ####################################################
      # Configure AWS Credentials
      ####################################################

      - name: Configure AWS Credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ####################################################
      # Install kubectl
      ####################################################

      - name: Install kubectl
        if: github.event_name != 'pull_request'
        uses: azure/setup-kubectl@v4

      ####################################################
      # Configure kubeconfig for EKS
      ####################################################

      - name: Configure kubeconfig
        if: github.event_name != 'pull_request'
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      ####################################################
      # Deploy to EKS
      ####################################################

      - name: Deploy Application
        if: github.event_name != 'pull_request'
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl apply -f k8s/mongodb.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      ####################################################
      # Wait for Deployments
      ####################################################

      - name: Wait for Deployments
        if: github.event_name != 'pull_request'
        run: |
          kubectl rollout status deployment/mongodb -n webapp --timeout=300s
          kubectl rollout status deployment/backend -n webapp --timeout=300s
          kubectl rollout status deployment/frontend -n webapp --timeout=300s

      ####################################################
      # Verify Deployment
      ####################################################

      - name: Verify
        if: github.event_name != 'pull_request'
        run: |
          kubectl get nodes
          kubectl get all -n webapp
          kubectl get ingress -n webapp
