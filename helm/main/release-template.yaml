---
# Source: simple-webapp/charts/mongodb/templates/mongodb-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: webapp
  labels:

    helm.sh/chart: mongodb-0.1.0
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/version: "7"
    app.kubernetes.io/managed-by: Helm
    component: mongodb
spec:
  selector:
    app.kubernetes.io/instance: simple-webapp
    component: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP

---
# Source: simple-webapp/charts/backend/templates/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: webapp
  labels:

    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: simple-webapp
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/instance: simple-webapp
      component: backend
  template:
    metadata:
      labels:

        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: simple-webapp
        component: backend
    spec:
      containers:
        - name: backend
          image: "nishadzc/simple-backend:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              value: "mongodb://mongodb-service:27017/todoapp"
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Source: simple-webapp/charts/frontend/templates/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: webapp
  labels:

    helm.sh/chart: frontend-0.1.0
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: simple-webapp
      component: frontend
  template:
    metadata:
      labels:

        helm.sh/chart: frontend-0.1.0
        app.kubernetes.io/name: frontend
        app.kubernetes.io/instance: simple-webapp
        app.kubernetes.io/version: "1.0"
        app.kubernetes.io/managed-by: Helm
        component: frontend
    spec:
      containers:
        - name: frontend
          image: nishadzc/simple-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Source: simple-webapp/charts/mongodb/templates/mongodb-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: webapp
  labels:

    helm.sh/chart: mongodb-0.1.0
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/version: "7"
    app.kubernetes.io/managed-by: Helm
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: simple-webapp
      component: mongodb
  template:
    metadata:
      labels:

        helm.sh/chart: mongodb-0.1.0
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/instance: simple-webapp
        app.kubernetes.io/version: "7"
        app.kubernetes.io/managed-by: Helm
        component: mongodb
    spec:
      containers:
        - name: mongodb
          image: "mongo:4.4"
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "todoapp"
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
# Source: simple-webapp/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: webapp
  labels:

    helm.sh/chart: simple-webapp-0.1.0
    app.kubernetes.io/name: simple-webapp
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/managed-by: Helm
    component: ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
