    helm.sh/chart: simple-webapp-0.1.0

---
# Source: simple-webapp/templates/storageclass.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: minikube-storage
  labels:

    helm.sh/chart: simple-webapp-0.1.0
    app.kubernetes.io/name: simple-webapp
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/managed-by: Helm

provisioner: k8s.io/minikube-hostpath

volumeBindingMode: Immediate

allowVolumeExpansion: true

reclaimPolicy: Delete
---
# Source: simple-webapp/charts/mongodb/templates/mongodb-pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: webapp
  labels:

    helm.sh/chart: mongodb-0.1.0
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: simple-webapp
    app.kubernetes.io/version: "7"
    app.kubernetes.io/managed-by: Helm
    component: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: minikube-storage
  resources:
    requests:
      storage: 2Gi

---
