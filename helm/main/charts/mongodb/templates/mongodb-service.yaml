apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: {{ .Release.Namespace  }}
  labels:
{{ include "mongodb.labels" . | nindent 4 }}
    component: mongodb
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: mongodb
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
